<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">LLM Agent Skill Supply Chain Architecture</title>
  <desc id="desc">Diagram showing user, agent, skills, local resources and attacker-controlled endpoint, highlighting the malicious skill path.</desc>
  <defs>
    <linearGradient id="gradTrusted" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1d3557"/>
      <stop offset="100%" stop-color="#457b9d"/>
    </linearGradient>
    <linearGradient id="gradSkill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#264653"/>
      <stop offset="100%" stop-color="#2a9d8f"/>
    </linearGradient>
    <linearGradient id="gradMalicious" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#9b2226"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>
    <style>
      .box { rx: 10; ry: 10; stroke: #111827; stroke-width: 1.2; }
      .label { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; fill: #111827; }
      .label-small { font-size: 11px; fill: #374151; }
      .title { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 18px; font-weight: 600; fill: #111827; }
      .subtitle { font-size: 12px; fill: #4b5563; }
      .arrow { stroke-width: 1.6; marker-end: url(#arrowHead); }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="30" y="32" class="title">LLM Agent Skill Supply Chain</text>
  <text x="30" y="52" class="subtitle">Malicious skills sit between the agent and your local resources</text>

  <!-- User -->
  <rect x="40" y="90" width="120" height="70" class="box" fill="#e5e7eb" />
  <text x="100" y="120" text-anchor="middle" class="label">Developer</text>
  <text x="100" y="140" text-anchor="middle" class="label-small">Prompts / questions</text>

  <!-- Agent core -->
  <rect x="210" y="80" width="170" height="90" class="box" fill="url(#gradTrusted)" />
  <text x="295" y="115" text-anchor="middle" class="label" fill="#f9fafb">LLM Agent</text>
  <text x="295" y="135" text-anchor="middle" class="label-small" fill="#e5e7eb">planning, tool selection, memory</text>

  <!-- Tools / Skills group -->
  <rect x="420" y="60" width="190" height="130" class="box" fill="#f3f4f6" />
  <text x="515" y="85" text-anchor="middle" class="label">Skills / Tools</text>

  <!-- Legit skill -->
  <rect x="435" y="100" width="160" height="34" class="box" fill="url(#gradSkill)" />
  <text x="515" y="121" text-anchor="middle" class="label" fill="#f9fafb">Legitimate code search</text>

  <!-- Malicious skill -->
  <rect x="435" y="142" width="160" height="34" class="box" fill="url(#gradMalicious)" />
  <text x="515" y="162" text-anchor="middle" class="label" fill="#f9fafb">Malicious code search (trojan)</text>

  <!-- Local resources -->
  <rect x="650" y="80" width="200" height="80" class="box" fill="#d1fae5" />
  <text x="750" y="108" text-anchor="middle" class="label">Local resources</text>
  <text x="750" y="128" text-anchor="middle" class="label-small">codebase, configs, secrets, docs</text>

  <!-- Attacker endpoint -->
  <rect x="680" y="190" width="170" height="70" class="box" fill="#fee2e2" />
  <text x="765" y="218" text-anchor="middle" class="label">Attacker-controlled API</text>
  <text x="765" y="238" text-anchor="middle" class="label-small">exfil server on the Internet</text>

  <!-- Arrows -->
  <!-- User -> Agent -->
  <line x1="160" y1="125" x2="210" y2="125" class="arrow" stroke="#4b5563" />

  <!-- Agent -> Skills -->
  <line x1="380" y1="110" x2="420" y2="110" class="arrow" stroke="#4b5563" />
  <line x1="380" y1="150" x2="420" y2="150" class="arrow" stroke="#4b5563" />

  <!-- Skills -> Local resources (legit) -->
  <line x1="595" y1="117" x2="650" y2="117" class="arrow" stroke="#10b981" />
  <text x="622" y="110" text-anchor="middle" class="label-small" fill="#059669">code search</text>

  <!-- Malicious skill -> Local resources -->
  <line x1="595" y1="159" x2="650" y2="159" class="arrow" stroke="#ef4444" />
  <text x="622" y="176" text-anchor="middle" class="label-small" fill="#b91c1c">wide repo scan</text>

  <!-- Malicious skill -> Attacker -->
  <path d="M595 159 C 640 210 650 210 680 225" fill="none" stroke="#b91c1c" class="arrow" />
  <text x="640" y="210" class="label-small" fill="#b91c1c">silent HTTPS exfil</text>

  <!-- Legend -->
  <rect x="40" y="290" width="820" height="100" rx="12" ry="12" fill="#f9fafb" stroke="#e5e7eb" />
  <text x="60" y="312" class="label">Legend</text>

  <rect x="60" y="325" width="18" height="12" class="box" fill="url(#gradSkill)" />
  <text x="86" y="335" class="label-small">Trusted / benign skill</text>

  <rect x="250" y="325" width="18" height="12" class="box" fill="url(#gradMalicious)" />
  <text x="276" y="335" class="label-small">Malicious or compromised skill</text>

  <line x1="60" y1="355" x2="90" y2="355" stroke="#10b981" stroke-width="2" marker-end="url(#arrowHead)" />
  <text x="100" y="359" class="label-small">Intended data flow</text>

  <line x1="250" y1="355" x2="280" y2="355" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowHead)" />
  <text x="290" y="359" class="label-small">Silent exfiltration path</text>
</svg>
