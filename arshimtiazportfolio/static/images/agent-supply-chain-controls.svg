<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Hardening the skill layer" style="background:#0b1020">
  <defs>
    <style>
      .title { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#e2e8f0; font-size:20px; font-weight:600; }
      .subtitle { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#94a3b8; font-size:13px; }
      .label { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#e2e8f0; font-size:14px; font-weight:500; }
      .small { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill:#9ca3af; font-size:12px; }
    </style>
  </defs>

  <text x="70" y="60" class="title">Hardening the skill layer</text>
  <text x="70" y="84" class="subtitle">From unconstrained skills to sandboxed, observable, and policy-limited behavior.</text>

  <!-- Two side-by-side panels with consistent size -->
  <rect x="70" y="120" width="500" height="220" rx="18" fill="#450a0a" stroke="#fecaca" stroke-width="1.2" />
  <rect x="630" y="120" width="500" height="220" rx="18" fill="#022c22" stroke="#6ee7b7" stroke-width="1.2" />

  <!-- Before -->
  <text x="90" y="145" class="label">Before: unconstrained skills</text>
  <text x="90" y="170" class="small">• Skills run in the same trust zone as the agent</text>
  <text x="90" y="188" class="small">• Full read access to repo, configs, and secrets</text>
  <text x="90" y="206" class="small">• Outbound HTTP allowed to any host</text>
  <text x="90" y="224" class="small">• No logging of file or network activity</text>
  <text x="90" y="242" class="small">• "Code search" implicitly trusted</text>
  <text x="90" y="275" class="small" fill="#fecaca">Result: a compromised skill can exfiltrate your entire codebase without being noticed.</text>

  <!-- After -->
  <text x="650" y="145" class="label">After: hardened skill layer</text>
  <text x="650" y="170" class="small">• Skills run in sandboxed containers or separate processes</text>
  <text x="650" y="188" class="small">• Read-only view of the repo where possible</text>
  <text x="650" y="206" class="small">• Network egress allowlist: only approved hosts</text>
  <text x="650" y="224" class="small">• File and HTTP access logged and monitored</text>
  <text x="650" y="242" class="small">• Policy: no single skill both reads secrets and sends HTTP</text>
  <text x="650" y="275" class="small" fill="#bbf7d0">Result: malicious skills are noisy, constrained, or blocked before exfil succeeds.</text>
</svg>
